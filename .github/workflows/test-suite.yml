name: Stress Test Distributed System

on:
  push:
    branches: [main, master]
  pull_request:
  workflow_dispatch:

jobs:
  run-script:
    runs-on: ubuntu-latest
    timeout-minutes: 30

    steps:
      - name: Checkout repo
        uses: actions/checkout@v4

      - name: Verifica runner
        run: |
          uname -a
          docker --version
          docker compose version
          python3 --version
          pwsh --version

      - name: Crea file .env
        run: |
          cat > .env <<EOF
          INTERNAL_TOKEN=my-token
          EOF

      - name: Esegui stress test
        shell: pwsh
        run: |
          $ErrorActionPreference = "Continue"
          $success = 0
          $fail = 0

          New-Item -ItemType Directory -Force -Path stress-logs | Out-Null

          for ($i = 1; $i -le 20; $i++) {
              Write-Host ""
              Write-Host "==============================" -ForegroundColor Cyan
              Write-Host "RUN #$i" -ForegroundColor Cyan
              Write-Host "==============================" -ForegroundColor Cyan

              $logFile = "stress-logs/run-$i.log"

              try {
                  if (Test-Path "docker-compose.generated.yml") {
                      docker compose -f docker-compose.generated.yml down -v --remove-orphans *>> $logFile
                  }

                  python3 -c "from run_cluster import generate_compose; generate_compose(3)" *>&1 | Tee-Object -FilePath $logFile -Append

                  if (-not (Test-Path "docker-compose.generated.yml")) {
                      throw "docker-compose.generated.yml was not generated"
                  }

                  docker compose -f docker-compose.generated.yml up -d --build *>&1 | Tee-Object -FilePath $logFile -Append

                  Start-Sleep -Seconds 5

                  ./test/run_all.ps1 *>&1 | Tee-Object -FilePath $logFile -Append

                  if ($LASTEXITCODE -eq 0) {
                      Write-Host "[OK] Run $i succeeded" -ForegroundColor Green
                      $success++
                  }
                  else {
                      Write-Host "[FAIL] Run $i failed (exit code $LASTEXITCODE)" -ForegroundColor Red
                      $fail++
                  }
              }
              catch {
                  Write-Host "[FAIL] Run $i crashed: $($_.Exception.Message)" -ForegroundColor Red
                  $fail++
                  "Crash: $($_.Exception.Message)" | Tee-Object -FilePath $logFile -Append
              }
              finally {
                  if (Test-Path "docker-compose.generated.yml") {
                      Write-Host "---- docker compose ps ----" | Tee-Object -FilePath $logFile -Append
                      docker compose -f docker-compose.generated.yml ps *>&1 | Tee-Object -FilePath $logFile -Append

                      Write-Host "---- docker compose logs ----" | Tee-Object -FilePath $logFile -Append
                      docker compose -f docker-compose.generated.yml logs --no-color *>&1 | Tee-Object -FilePath $logFile -Append

                      docker compose -f docker-compose.generated.yml down -v --remove-orphans *>&1 | Tee-Object -FilePath $logFile -Append
                  }

                  Remove-Item -Force "docker-compose.generated.yml" -ErrorAction SilentlyContinue
                  docker network prune -f | Out-Null
                  Start-Sleep -Seconds 2
              }
          }

          Write-Host ""
          Write-Host "==============================" -ForegroundColor Yellow
          Write-Host "SUMMARY" -ForegroundColor Yellow
          Write-Host "==============================" -ForegroundColor Yellow
          Write-Host "Success: $success"
          Write-Host "Fail: $fail"

          if ($fail -gt 0) {
              exit 1
          }

      - name: Upload stress logs
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: stress-test-logs
          path: stress-logs/
