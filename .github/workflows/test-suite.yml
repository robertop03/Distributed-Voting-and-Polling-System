name: Stress Test Distributed System

on:
  workflow_dispatch:

jobs:
  run-script:
    runs-on: ubuntu-latest
    timeout-minutes: 30

    steps:
      - name: Checkout repo
        uses: actions/checkout@v4

      - name: Verifica runner
        run: |
          uname -a
          docker --version
          docker compose version
          pwsh --version

      - name: Pre-clean Docker environment
        run: |
          docker compose -f docker-compose.generated.yml down -v --remove-orphans 2>/dev/null || true
          docker compose down -v --remove-orphans 2>/dev/null || true
          docker rm -f $(docker ps -aq) 2>/dev/null || true
          docker network prune -f || true

      - name: Esegui stress test PowerShell
        shell: pwsh
        run: |
          $ErrorActionPreference = "Continue"
          $success = 0
          $fail = 0

          New-Item -ItemType Directory -Force -Path stress-logs | Out-Null

          for ($i = 1; $i -le 20; $i++) {
              Write-Host ""
              Write-Host "==============================" -ForegroundColor Cyan
              Write-Host "RUN #$i" -ForegroundColor Cyan
              Write-Host "==============================" -ForegroundColor Cyan

              # cleanup prima di ogni run
              docker compose -f docker-compose.generated.yml down -v --remove-orphans 2>$null
              docker compose down -v --remove-orphans 2>$null
              docker network prune -f | Out-Null

              $logFile = "stress-logs/run-$i.log"

              try {
                  ./test/run_all.ps1 *>&1 | Tee-Object -FilePath $logFile

                  if ($LASTEXITCODE -eq 0) {
                      Write-Host "[OK] Run $i succeeded" -ForegroundColor Green
                      $success++
                  }
                  else {
                      Write-Host "[FAIL] Run $i failed (non-zero exit code: $LASTEXITCODE)" -ForegroundColor Red
                      $fail++

                      Write-Host "---- docker compose ps ----" | Tee-Object -FilePath $logFile -Append
                      docker compose -f docker-compose.generated.yml ps *>&1 | Tee-Object -FilePath $logFile -Append

                      Write-Host "---- docker compose logs ----" | Tee-Object -FilePath $logFile -Append
                      docker compose -f docker-compose.generated.yml logs --no-color *>&1 | Tee-Object -FilePath $logFile -Append
                  }
              }
              catch {
                  Write-Host "[FAIL] Run $i crashed: $($_.Exception.Message)" -ForegroundColor Red
                  $fail++

                  "Crash: $($_.Exception.Message)" | Tee-Object -FilePath $logFile -Append

                  Write-Host "---- docker compose ps ----" | Tee-Object -FilePath $logFile -Append
                  docker compose -f docker-compose.generated.yml ps *>&1 | Tee-Object -FilePath $logFile -Append

                  Write-Host "---- docker compose logs ----" | Tee-Object -FilePath $logFile -Append
                  docker compose -f docker-compose.generated.yml logs --no-color *>&1 | Tee-Object -FilePath $logFile -Append
              }
              finally {
                  # cleanup dopo ogni run
                  docker compose -f docker-compose.generated.yml down -v --remove-orphans 2>$null
                  docker compose down -v --remove-orphans 2>$null
                  docker network prune -f | Out-Null
                  Start-Sleep -Seconds 2
              }
          }

          Write-Host ""
          Write-Host "==============================" -ForegroundColor Yellow
          Write-Host "SUMMARY" -ForegroundColor Yellow
          Write-Host "==============================" -ForegroundColor Yellow
          Write-Host "Success: $success"
          Write-Host "Fail: $fail"

          if ($fail -gt 0) {
              exit 1
          }

      - name: Upload stress logs
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: stress-test-logs
          path: stress-logs/

      - name: Final Docker cleanup
        if: always()
        run: |
          docker compose -f docker-compose.generated.yml down -v --remove-orphans 2>/dev/null || true
          docker compose down -v --remove-orphans 2>/dev/null || true
          docker network prune -f || true
