name: Stress Test Distributed System

on:
  workflow_dispatch:

jobs:
  run-script:
    runs-on: windows-latest

    steps:
      - name: Checkout repo
        uses: actions/checkout@v4

      - name: Esegui script PowerShell
        shell: pwsh
        run: |
          $success = 0
          $fail = 0

          for ($i = 1; $i -le 50; $i++) {
              Write-Host "`n=============================="
              Write-Host "RUN #$i"
              Write-Host "==============================" -ForegroundColor Cyan

              try {
                  pwsh ./test/run_all.ps1

                  if ($LASTEXITCODE -eq 0) {
                      Write-Host "[OK] Run $i succeeded" -ForegroundColor Green
                      $success++
                  } else {
                      Write-Host "[FAIL] Run $i failed (non-zero exit code)" -ForegroundColor Red
                      $fail++
                  }
              }
              catch {
                  Write-Host "[FAIL] Run $i crashed: $($_.Exception.Message)" -ForegroundColor Red
                  $fail++
              }
          }

          Write-Host "`n=============================="
          Write-Host "SUMMARY"
          Write-Host "=============================="
          Write-Host "Success: $success"
          Write-Host "Fail: $fail"

          if ($fail -gt 0) {
              exit 1
          }
